<!--Q1 In VS Code, what happens when you type ! in a blank .html file and press Tab or Enter?
In VS Code, typing ! in an empty HTML file and pressing Tab or Enter triggers Emmet to generate an HTML5 boilerplate template. This automatically creates the basic structure of an HTML document, including the DOCTYPE declaration, html, head, body, meta tags, and title tag, saving time and ensuring a proper page setup. -->
